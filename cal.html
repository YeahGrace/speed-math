<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行测速算练习 - 两位数乘一位数</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 8px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #1a1a2e;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .stat-value.accuracy {
            color: #27ae60;
        }

        .stat-value.time {
            color: #e74c3c;
        }

        .problem-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .problem {
            font-size: 56px;
            font-weight: bold;
            color: #1a1a2e;
            letter-spacing: 4px;
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
        }

        .answer-input {
            width: 180px;
            font-size: 36px;
            text-align: center;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.3s;
            font-variant-numeric: tabular-nums;
        }

        .answer-input:focus {
            border-color: #3498db;
        }

        .answer-input.correct {
            border-color: #27ae60;
            background: #e8f8f0;
        }

        .answer-input.wrong {
            border-color: #e74c3c;
            background: #fdf0f0;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .feedback {
            text-align: center;
            margin-top: 16px;
            font-size: 16px;
            min-height: 24px;
            font-weight: 500;
        }

        .feedback.correct {
            color: #27ae60;
        }

        .feedback.wrong {
            color: #e74c3c;
        }

        .settings {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #eee;
        }

        .settings-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 12px;
        }

        .toggle-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .toggle-btn {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .toggle-btn.active {
            background: #3498db;
            color: white;
            border-color: #3498db;
        }

        .history {
            margin-top: 24px;
            max-height: 150px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 8px;
            margin-bottom: 4px;
        }

        .history-item.correct {
            background: #e8f8f0;
            color: #27ae60;
        }

        .history-item.wrong {
            background: #fdf0f0;
            color: #e74c3c;
        }

        .history-screen .session-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .session-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .session-card:hover {
            background: #eef1f5;
        }

        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .session-date {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a2e;
        }

        .session-summary {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: #666;
        }

        .session-summary span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .session-details {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e0e0e0;
            display: none;
        }

        .session-details.expanded {
            display: block;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            font-size: 13px;
        }

        .detail-item {
            padding: 6px 10px;
            border-radius: 6px;
            background: white;
        }

        .detail-item.correct {
            color: #27ae60;
        }

        .detail-item.wrong {
            color: #e74c3c;
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        .btn-group .btn {
            flex: 1;
            margin-top: 0;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 14px;
        }

        .overall-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .overall-stat {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }

        .overall-stat-value {
            font-size: 22px;
            font-weight: bold;
            color: #1a1a2e;
        }

        .overall-stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .hidden {
            display: none;
        }

        .start-screen {
            text-align: center;
        }

        .start-screen p {
            color: #666;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .timer-bar {
            width: 100%;
            height: 4px;
            background: #eee;
            border-radius: 2px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .timer-bar-inner {
            height: 100%;
            background: #3498db;
            transition: width 1s linear;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>行测速算练习</h1>
        <p class="subtitle">两位数 × 一位数（进位强化）</p>

        <!-- 开始界面 -->
        <div id="startScreen" class="start-screen">
            <p>
                本题库优先抽取<strong>需要进位</strong>的乘法题目，<br>
                帮助你强化速算中最容易出错的环节。<br><br>
                建议每题控制在 <strong>5 秒内</strong>完成。
            </p>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="app.start()">开始练习</button>
                <button class="btn btn-secondary" onclick="app.showHistory()">查看历史</button>
            </div>
        </div>

        <!-- 历史界面 -->
        <div id="historyScreen" class="history-screen hidden">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="font-size:18px; color:#1a1a2e;">练习历史</h2>
                <button class="btn btn-secondary" style="width:auto; padding:8px 16px; margin-top:0; font-size:13px;" onclick="app.backToStart()">返回</button>
            </div>

            <div id="overallStats" class="overall-stats"></div>

            <div class="settings-title">历次练习记录</div>
            <div id="sessionList" class="session-list"></div>

            <button class="btn btn-danger" style="margin-top:16px;" onclick="app.clearAllHistory()">清空所有历史</button>
        </div>

        <!-- 练习界面 -->
        <div id="gameScreen" class="hidden">
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="statCount">0</div>
                    <div class="stat-label">已答</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value accuracy" id="statAccuracy">--</div>
                    <div class="stat-label">正确率</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value time" id="statTime">0s</div>
                    <div class="stat-label">本题用时</div>
                </div>
            </div>

            <div class="problem-area">
                <div class="problem" id="problem">-- × -</div>
                <input 
                    type="number" 
                    class="answer-input" 
                    id="answerInput" 
                    placeholder="?" 
                    autocomplete="off"
                >
            </div>

            <div class="feedback" id="feedback"></div>

            <button class="btn btn-secondary" onclick="app.end()">结束练习</button>

            <div class="history" id="history"></div>
        </div>

        <!-- 设置 -->
        <div class="settings">
            <div class="settings-title">难度筛选（优先出以下类型）</div>
            <div class="toggle-group">
                <button class="toggle-btn active" onclick="app.toggleSetting(this, 'carry')">有进位</button>
                <button class="toggle-btn" onclick="app.toggleSetting(this, 'nocarry')">无进位</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'speed_math_history';

        const app = {
            currentProblem: null,
            stats: { total: 0, correct: 0 },
            startTime: 0,
            timerInterval: null,
            settings: { carry: true, nocarry: false },
            history: [],
            currentSession: null,

            start() {
                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('historyScreen').classList.add('hidden');
                document.getElementById('gameScreen').classList.remove('hidden');
                this.stats = { total: 0, correct: 0 };
                this.history = [];
                this.currentSession = {
                    id: Date.now(),
                    date: new Date().toISOString(),
                    items: [],
                    settings: { ...this.settings }
                };
                this.updateStats();
                this.nextProblem();

                document.getElementById('answerInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.submit();
                });
                document.getElementById('answerInput').focus();
            },

            end() {
                this.saveCurrentSession();
                document.getElementById('gameScreen').classList.add('hidden');
                document.getElementById('startScreen').classList.remove('hidden');
                clearInterval(this.timerInterval);
                this.currentSession = null;
            },

            saveCurrentSession() {
                if (!this.currentSession || this.currentSession.items.length === 0) return;
                const sessions = this.loadSessions();
                sessions.unshift(this.currentSession);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions.slice(0, 100)));
            },

            loadSessions() {
                try {
                    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
                } catch {
                    return [];
                }
            },

            showHistory() {
                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('historyScreen').classList.remove('hidden');
                this.renderSessionList();
            },

            backToStart() {
                document.getElementById('historyScreen').classList.add('hidden');
                document.getElementById('startScreen').classList.remove('hidden');
            },

            renderSessionList() {
                const sessions = this.loadSessions();
                const container = document.getElementById('sessionList');
                const statsContainer = document.getElementById('overallStats');

                if (sessions.length === 0) {
                    container.innerHTML = '<div class="empty-state">暂无练习记录<br>快开始你的第一次练习吧</div>';
                    statsContainer.innerHTML = '';
                    return;
                }

                // 汇总统计
                const totalProblems = sessions.reduce((sum, s) => sum + s.items.length, 0);
                const totalCorrect = sessions.reduce((sum, s) => sum + s.items.filter(i => i.correct).length, 0);
                const totalTime = sessions.reduce((sum, s) => sum + s.items.reduce((t, i) => t + i.time, 0), 0);
                const avgTime = totalProblems > 0 ? (totalTime / totalProblems).toFixed(1) : 0;

                statsContainer.innerHTML = `
                    <div class="overall-stat">
                        <div class="overall-stat-value">${sessions.length}</div>
                        <div class="overall-stat-label">练习次数</div>
                    </div>
                    <div class="overall-stat">
                        <div class="overall-stat-value">${totalProblems}</div>
                        <div class="overall-stat-label">总题数</div>
                    </div>
                    <div class="overall-stat">
                        <div class="overall-stat-value">${avgTime}s</div>
                        <div class="overall-stat-label">平均用时</div>
                    </div>
                `;

                container.innerHTML = sessions.map((session, idx) => {
                    const date = new Date(session.date);
                    const dateStr = `${date.getMonth() + 1}月${date.getDate()}日 ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
                    const correctCount = session.items.filter(i => i.correct).length;
                    const accuracy = Math.round(correctCount / session.items.length * 100);
                    const avgTime = (session.items.reduce((s, i) => s + i.time, 0) / session.items.length).toFixed(1);

                    return `
                        <div class="session-card" onclick="app.toggleSessionDetails(${idx})">
                            <div class="session-header">
                                <div class="session-date">${dateStr}</div>
                                <div style="font-size:13px; color:${accuracy >= 90 ? '#27ae60' : accuracy >= 70 ? '#f39c12' : '#e74c3c'}; font-weight:600;">${accuracy}% 正确率</div>
                            </div>
                            <div class="session-summary">
                                <span>共 ${session.items.length} 题</span>
                                <span>✓ ${correctCount} 题</span>
                                <span>平均 ${avgTime}s</span>
                            </div>
                            <div class="session-details" id="session-detail-${idx}">
                                <div class="detail-grid">
                                    ${session.items.map((item, i) => `
                                        <div class="detail-item ${item.correct ? 'correct' : 'wrong'}">
                                            ${item.problem} = ${item.answer} ${item.correct ? '✓' : `(✗ ${item.userAnswer})`} · ${item.time}s
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            },

            toggleSessionDetails(idx) {
                const el = document.getElementById(`session-detail-${idx}`);
                if (el) el.classList.toggle('expanded');
            },

            clearAllHistory() {
                if (!confirm('确定要清空所有练习历史吗？此操作不可恢复。')) return;
                localStorage.removeItem(STORAGE_KEY);
                this.renderSessionList();
            },

            toggleSetting(btn, type) {
                // 至少保留一个选中
                const active = btn.classList.contains('active');
                if (active && Object.values(this.settings).filter(v => v).length === 1) return;
                
                btn.classList.toggle('active');
                this.settings[type] = !active;
            },

            // 判断乘法是否有进位：两位数的个位数 × 一位数 > 10，需要向十位进位
            hasCarry(a, b) {
                return (a % 10) * b > 10;
            },

            generateProblem() {
                const preferCarry = this.settings.carry && !this.settings.nocarry;
                const preferNoCarry = !this.settings.carry && this.settings.nocarry;
                
                let problems = [];
                
                // 生成所有可能的组合
                for (let a = 10; a <= 99; a++) {
                    for (let b = 2; b <= 9; b++) {
                        const carry = this.hasCarry(a, b);
                        if (preferCarry && !carry) continue;
                        if (preferNoCarry && carry) continue;
                        problems.push({ a, b, answer: a * b, carry });
                    }
                }
                
                // 如果有进位优先设置，但题库不够，放宽条件
                if (problems.length === 0) {
                    for (let a = 10; a <= 99; a++) {
                        for (let b = 2; b <= 9; b++) {
                            problems.push({ a, b, answer: a * b, carry: this.hasCarry(a, b) });
                        }
                    }
                }
                
                return problems[Math.floor(Math.random() * problems.length)];
            },

            nextProblem() {
                this.currentProblem = this.generateProblem();
                document.getElementById('problem').textContent = 
                    `${this.currentProblem.a} × ${this.currentProblem.b}`;
                
                const input = document.getElementById('answerInput');
                input.value = '';
                input.className = 'answer-input';
                input.focus();
                
                document.getElementById('feedback').textContent = '';
                
                this.startTime = Date.now();
                clearInterval(this.timerInterval);
                this.timerInterval = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - this.startTime) / 1000);
                    document.getElementById('statTime').textContent = elapsed + 's';
                }, 1000);
            },

            submit() {
                const input = document.getElementById('answerInput');
                const userAnswer = parseInt(input.value);

                if (isNaN(userAnswer)) return;

                clearInterval(this.timerInterval);

                const correct = userAnswer === this.currentProblem.answer;
                const time = Math.floor((Date.now() - this.startTime) / 1000);

                this.stats.total++;
                if (correct) this.stats.correct++;

                // 显示结果
                input.className = 'answer-input ' + (correct ? 'correct' : 'wrong');
                const feedback = document.getElementById('feedback');
                feedback.className = 'feedback ' + (correct ? 'correct' : 'wrong');

                if (correct) {
                    feedback.textContent = '✓ 正确';
                } else {
                    feedback.textContent = `✗ 正确答案：${this.currentProblem.answer}`;
                    input.classList.add('shake');
                    setTimeout(() => input.classList.remove('shake'), 300);
                }

                // 记录历史
                const record = {
                    problem: `${this.currentProblem.a} × ${this.currentProblem.b}`,
                    userAnswer,
                    correct,
                    answer: this.currentProblem.answer,
                    time
                };
                this.history.unshift(record);
                if (this.currentSession) {
                    this.currentSession.items.push(record);
                }
                this.renderHistory();
                this.updateStats();

                // 自动下一题
                setTimeout(() => this.nextProblem(), correct ? 800 : 1500);
            },

            updateStats() {
                document.getElementById('statCount').textContent = this.stats.total;
                const accuracy = this.stats.total > 0 
                    ? Math.round(this.stats.correct / this.stats.total * 100) + '%'
                    : '--';
                document.getElementById('statAccuracy').textContent = accuracy;
            },

            renderHistory() {
                const container = document.getElementById('history');
                container.innerHTML = this.history.slice(0, 5).map(h => `
                    <div class="history-item ${h.correct ? 'correct' : 'wrong'}">
                        <span>${h.problem} = ${h.answer}</span>
                        <span>${h.correct ? '✓' : `✗ 你答${h.userAnswer}`} · ${h.time}s</span>
                    </div>
                `).join('');
            }
        };

        // 页面加载时聚焦开始按钮
        document.querySelector('.btn-primary').focus();
    </script>
</body>
</html>
