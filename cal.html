<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>速算练习 - 两位数乘一位数</title>
    <style>
        :root {
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #666666;
            --border: #e0e0e0;
            --shadow: rgba(0,0,0,0.08);
            --input-bg: #ffffff;
            --stats-bg: #f8f9fa;
            --table-header: #f8f9fa;
            --num-bg: #f8f9fa;
            --func-bg: #fff3e0;
            --func-border: #ffe0b2;
            --func-text: #e65100;
            --submit-bg: #e8f8f0;
            --submit-border: #a5d6a7;
            --submit-text: #27ae60;
            --toggle-bg: #ffffff;
            --theme-icon: #f39c12;
        }

        [data-theme="dark"] {
            --bg: #121212;
            --card: #1e1e2f;
            --text: #e0e0e0;
            --text-secondary: #a0a0b0;
            --border: #333344;
            --shadow: rgba(0,0,0,0.3);
            --input-bg: #2a2a3a;
            --stats-bg: #272738;
            --table-header: #272738;
            --num-bg: #2a2a3a;
            --func-bg: #3a2a1a;
            --func-border: #5a3a1a;
            --func-text: #ffab40;
            --submit-bg: #1a3a2a;
            --submit-border: #2a5a3a;
            --submit-text: #66bb6a;
            --toggle-bg: #2a2a3a;
            --theme-icon: #90caf9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
        }

        .container {
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 4px 20px var(--shadow);
            padding: 24px 20px;
            width: 100%;
            max-width: 500px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 16px 14px;
                border-radius: 12px;
            }

            h1 {
                font-size: 20px;
                margin-bottom: 4px;
            }

            .subtitle {
                font-size: 12px;
                margin-bottom: 16px;
            }

            .stats {
                margin-bottom: 12px;
                padding: 10px;
            }

            .stat-value {
                font-size: 20px;
            }

            .problem-area {
                margin-bottom: 12px;
            }

            .problem {
                font-size: 40px;
                margin-bottom: 10px;
            }

            .answer-input {
                width: 140px;
                font-size: 28px;
                padding: 8px;
                border-radius: 8px;
            }

            .feedback {
                margin-top: 6px;
                font-size: 14px;
                min-height: 18px;
            }

            .num-pad {
                gap: 6px;
                margin-top: 10px;
            }

            .num-btn {
                padding: 10px 6px;
                font-size: 18px;
                border-radius: 8px;
            }
        }

        .header-row {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 8px;
        }

        .theme-toggle {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--theme-icon);
            background: var(--toggle-bg);
            transition: all 0.2s;
        }

        .theme-toggle:active {
            transform: translateY(-50%) scale(0.92);
        }

        h1 {
            text-align: center;
            color: var(--text);
            margin-bottom: 8px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 16px;
            background: var(--stats-bg);
            border-radius: 12px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: var(--text);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .stat-value.accuracy {
            color: #27ae60;
        }

        .stat-value.time {
            color: #e74c3c;
        }

        .problem-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .problem {
            font-size: 40px;
            font-weight: bold;
            color: var(--text);
            letter-spacing: 4px;
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
        }

        .answer-input {
            width: 180px;
            font-size: 30px;
            text-align: center;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 12px;
            outline: none;
            transition: border-color 0.3s;
            font-variant-numeric: tabular-nums;
            background: var(--input-bg);
            color: var(--text);
        }

        .answer-input:focus {
            border-color: #3498db;
        }

        .answer-input.correct {
            border-color: #27ae60;
            background: rgba(39, 174, 96, 0.1);
        }

        .answer-input.wrong {
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.1);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .feedback {
            text-align: center;
            margin-top: 16px;
            font-size: 16px;
            min-height: 24px;
            font-weight: 500;
        }

        .feedback.correct {
            color: #27ae60;
        }

        .feedback.wrong {
            color: #e74c3c;
        }

        .settings {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .settings-title {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .toggle-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .toggle-btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            background: var(--toggle-bg);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            color: var(--text);
        }

        .toggle-btn.active {
            background: #3498db;
            color: white;
            border-color: #3498db;
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        .btn-group .btn {
            flex: 1;
            margin-top: 0;
        }

        .hidden {
            display: none;
        }

        .start-screen {
            text-align: center;
        }

        .start-screen p {
            color: var(--text-secondary);
            margin-bottom: 24px;
            line-height: 1.6;
        }

        /* 结果页面 */
        .result-screen .result-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .result-screen .result-header h2 {
            font-size: 20px;
            color: var(--text);
            margin-bottom: 8px;
        }

        .result-screen .result-summary {
            display: flex;
            justify-content: space-around;
            margin-bottom: 24px;
            padding: 16px;
            background: var(--stats-bg);
            border-radius: 12px;
        }

        .result-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .result-table th,
        .result-table td {
            padding: 10px 8px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }

        .result-table th {
            background: var(--table-header);
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 12px;
        }

        .result-table td.correct {
            color: #27ae60;
        }

        .result-table td.wrong {
            color: #e74c3c;
            font-weight: 600;
        }

        .result-table td.user-wrong {
            color: #e74c3c;
            text-decoration: line-through;
        }

        .result-table .status-mark {
            font-size: 16px;
        }

        /* 数字键盘 */
        .num-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 280px;
            margin: 20px auto 0;
        }

        .num-btn {
            padding: 16px;
            font-size: 22px;
            font-weight: 600;
            border: 1px solid var(--border);
            background: var(--num-bg);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
            -webkit-user-select: none;
            color: var(--text);
        }

        .num-btn:active {
            background: #3498db;
            color: white;
            border-color: #3498db;
            transform: scale(0.96);
        }

        .num-btn.func {
            background: var(--func-bg);
            border-color: var(--func-border);
            color: var(--func-text);
        }

        .num-btn.func:active {
            background: var(--func-text);
            color: white;
            border-color: var(--func-text);
        }

        .num-btn.submit-btn {
            background: var(--submit-bg);
            border-color: var(--submit-border);
            color: var(--submit-text);
        }

        .num-btn.submit-btn:active {
            background: #27ae60;
            color: white;
            border-color: #27ae60;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-row">
            <h1>速算练习</h1>
            <button class="theme-toggle" id="themeBtn" onclick="app.toggleTheme()" title="切换主题">☀️</button>
        </div>
        <p class="subtitle">两位数 × 一位数（进位强化）</p>

        <!-- 开始界面 -->
        <div id="startScreen" class="start-screen">
            <p>
                本题库优先抽取<strong>需要进位</strong>的乘法题目，<br>
                帮助你强化速算中最容易出错的环节。
            </p>

            <div class="settings" style="margin-top:0; padding-top:0; border-top:none; margin-bottom:24px;">
                <div class="settings-title">选择题量</div>
                <div class="toggle-group" id="questionCountGroup">
                    <button class="toggle-btn active" onclick="app.selectCount(this, 10)">10道</button>
                    <button class="toggle-btn" onclick="app.selectCount(this, 15)">15道</button>
                    <button class="toggle-btn" onclick="app.selectCount(this, 20)">20道</button>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="app.start()">开始练习</button>
            </div>
        </div>

        <!-- 练习界面 -->
        <div id="gameScreen" class="hidden">
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="statCount">0/10</div>
                    <div class="stat-label">进度</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value accuracy" id="statAccuracy">--</div>
                    <div class="stat-label">正确率</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value time" id="statTime">0s</div>
                    <div class="stat-label">本题用时</div>
                </div>
            </div>

            <div class="problem-area">
                <div class="problem" id="problem">-- × -</div>
                <input
                    type="text"
                    class="answer-input"
                    id="answerInput"
                    placeholder="?"
                    autocomplete="off"
                    inputmode="numeric"
                    readonly
                >
            </div>

            <div class="feedback" id="feedback"></div>

            <div class="num-pad" id="numPad">
                <button class="num-btn" onclick="app.numInput('1')">1</button>
                <button class="num-btn" onclick="app.numInput('2')">2</button>
                <button class="num-btn" onclick="app.numInput('3')">3</button>
                <button class="num-btn" onclick="app.numInput('4')">4</button>
                <button class="num-btn" onclick="app.numInput('5')">5</button>
                <button class="num-btn" onclick="app.numInput('6')">6</button>
                <button class="num-btn" onclick="app.numInput('7')">7</button>
                <button class="num-btn" onclick="app.numInput('8')">8</button>
                <button class="num-btn" onclick="app.numInput('9')">9</button>
                <button class="num-btn func" onclick="app.numClear()">C</button>
                <button class="num-btn" onclick="app.numInput('0')">0</button>
                <button class="num-btn func" onclick="app.numBackspace()">←</button>
                <button class="num-btn submit-btn" style="grid-column: span 3;" onclick="app.submit()">提交</button>
            </div>
        </div>

        <!-- 结果界面 -->
        <div id="resultScreen" class="result-screen hidden">
            <div class="result-header">
                <h2>练习完成</h2>
                <p style="color:var(--text-secondary); font-size:14px;" id="resultSummary"></p>
            </div>

            <div class="result-summary">
                <div class="stat-item">
                    <div class="stat-value" id="resultCorrect">0</div>
                    <div class="stat-label">正确</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="resultWrong">0</div>
                    <div class="stat-label">错误</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value time" id="resultTotalTime">0s</div>
                    <div class="stat-label">总用时</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value accuracy" id="resultAccuracy">0%</div>
                    <div class="stat-label">正确率</div>
                </div>
            </div>

            <table class="result-table">
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>题目</th>
                        <th>正确答案</th>
                        <th>你的答案</th>
                        <th>用时</th>
                        <th>结果</th>
                    </tr>
                </thead>
                <tbody id="resultTableBody"></tbody>
            </table>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="app.start()">再来一次</button>
                <button class="btn btn-secondary" onclick="app.backToStart()">返回首页</button>
            </div>
        </div>

        <!-- 说明 -->
        <div class="settings" id="globalSettings">
            <div class="settings-title">练习说明</div>
            <p style="font-size:13px; color:var(--text-secondary); line-height:1.6;">
                所有题目均为<strong>有进位</strong>的乘法练习，<br>
                即两位数的个位数乘以一位数后结果 > 10。<br>
                建议每题控制在 <strong>2 秒</strong>以内完成。
            </p>
        </div>
    </div>

    <script>
        // 禁止双指缩放
        document.addEventListener('touchmove', function (e) {
            if (e.scale !== 1) {
                e.preventDefault();
            }
        }, { passive: false });

        document.addEventListener('gesturestart', function (e) {
            e.preventDefault();
        });

        document.addEventListener('gesturechange', function (e) {
            e.preventDefault();
        });

        document.addEventListener('gestureend', function (e) {
            e.preventDefault();
        });

        const THEME_KEY = 'speed_math_theme';

        const app = {
            currentProblem: null,
            stats: { total: 0, correct: 0 },
            startTime: 0,
            totalStartTime: 0,
            timerInterval: null,
            settings: { carry: true, nocarry: false },
            questionCount: 10,
            history: [],
            sessionStartTime: 0,

            initTheme() {
                const saved = localStorage.getItem(THEME_KEY);
                if (saved === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    document.getElementById('themeBtn').textContent = '🌙';
                }
            },

            toggleTheme() {
                const html = document.documentElement;
                const btn = document.getElementById('themeBtn');
                const isDark = html.getAttribute('data-theme') === 'dark';
                if (isDark) {
                    html.setAttribute('data-theme', 'light');
                    btn.textContent = '☀️';
                    localStorage.setItem(THEME_KEY, 'light');
                } else {
                    html.setAttribute('data-theme', 'dark');
                    btn.textContent = '🌙';
                    localStorage.setItem(THEME_KEY, 'dark');
                }
            },

            selectCount(btn, count) {
                document.querySelectorAll('#questionCountGroup .toggle-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                this.questionCount = count;
            },

            start() {
                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('resultScreen').classList.add('hidden');
                document.getElementById('gameScreen').classList.remove('hidden');
                document.getElementById('globalSettings').classList.add('hidden');

                this.stats = { total: 0, correct: 0 };
                this.history = [];
                this.sessionStartTime = Date.now();
                this.updateStats();
                this.nextProblem();

                const input = document.getElementById('answerInput');
                const newInput = input.cloneNode(true);
                input.parentNode.replaceChild(newInput, input);
                newInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.submit();
                });
                newInput.focus();
            },

            backToStart() {
                document.getElementById('resultScreen').classList.add('hidden');
                document.getElementById('gameScreen').classList.add('hidden');
                document.getElementById('startScreen').classList.remove('hidden');
                document.getElementById('globalSettings').classList.remove('hidden');
                clearInterval(this.timerInterval);
            },

            hasCarry(a, b) {
                return (a % 10) * b > 10;
            },

            generateProblem() {
                let problems = [];
                for (let a = 10; a <= 99; a++) {
                    for (let b = 2; b <= 9; b++) {
                        if (this.hasCarry(a, b)) {
                            problems.push({ a, b, answer: a * b });
                        }
                    }
                }
                return problems[Math.floor(Math.random() * problems.length)];
            },

            nextProblem() {
                if (this.stats.total >= this.questionCount) {
                    this.showResult();
                    return;
                }

                this.currentProblem = this.generateProblem();
                document.getElementById('problem').textContent =
                    `${this.currentProblem.a} × ${this.currentProblem.b}`;

                const input = document.getElementById('answerInput');
                input.value = '';
                input.className = 'answer-input';
                input.focus();

                document.querySelectorAll('.num-btn').forEach(btn => {
                    btn.disabled = false;
                    btn.style.opacity = '1';
                });

                document.getElementById('feedback').textContent = '';

                this.startTime = Date.now();
                clearInterval(this.timerInterval);
                this.timerInterval = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - this.startTime) / 1000);
                    document.getElementById('statTime').textContent = elapsed + 's';
                }, 1000);
            },

            numInput(num) {
                const input = document.getElementById('answerInput');
                if (input.value.length >= 4) return;
                input.value += num;
            },

            numClear() {
                document.getElementById('answerInput').value = '';
            },

            numBackspace() {
                const input = document.getElementById('answerInput');
                input.value = input.value.slice(0, -1);
            },

            submit() {
                const input = document.getElementById('answerInput');
                const userAnswer = parseInt(input.value);

                if (isNaN(userAnswer)) return;

                clearInterval(this.timerInterval);

                const correct = userAnswer === this.currentProblem.answer;
                const time = Math.floor((Date.now() - this.startTime) / 1000);

                this.stats.total++;
                if (correct) this.stats.correct++;

                input.className = 'answer-input ' + (correct ? 'correct' : 'wrong');
                const feedback = document.getElementById('feedback');
                feedback.className = 'feedback ' + (correct ? 'correct' : 'wrong');

                document.querySelectorAll('.num-btn').forEach(btn => {
                    btn.disabled = true;
                    btn.style.opacity = '0.5';
                });

                if (correct) {
                    feedback.textContent = '✓ 正确';
                } else {
                    feedback.textContent = `✗ 正确答案：${this.currentProblem.answer}`;
                    input.classList.add('shake');
                    setTimeout(() => input.classList.remove('shake'), 300);
                }

                this.history.push({
                    idx: this.stats.total,
                    problem: `${this.currentProblem.a} × ${this.currentProblem.b}`,
                    userAnswer,
                    correct,
                    answer: this.currentProblem.answer,
                    time
                });
                this.updateStats();

                if (this.stats.total >= this.questionCount) {
                    setTimeout(() => this.showResult(), correct ? 800 : 1500);
                } else {
                    setTimeout(() => this.nextProblem(), correct ? 800 : 1500);
                }
            },

            showResult() {
                document.getElementById('gameScreen').classList.add('hidden');
                document.getElementById('resultScreen').classList.remove('hidden');
                document.getElementById('globalSettings').classList.remove('hidden');

                const totalTime = Math.floor((Date.now() - this.sessionStartTime) / 1000);
                const wrongCount = this.questionCount - this.stats.correct;
                const accuracy = Math.round(this.stats.correct / this.questionCount * 100);

                document.getElementById('resultCorrect').textContent = this.stats.correct;
                document.getElementById('resultWrong').textContent = wrongCount;
                document.getElementById('resultTotalTime').textContent = totalTime + 's';
                document.getElementById('resultAccuracy').textContent = accuracy + '%';

                const mins = Math.floor(totalTime / 60);
                const secs = totalTime % 60;
                const timeStr = mins > 0 ? `${mins}分${secs}秒` : `${secs}秒`;
                document.getElementById('resultSummary').textContent =
                    `本次练习 ${this.questionCount} 题，总用时 ${timeStr}`;

                const tbody = document.getElementById('resultTableBody');
                tbody.innerHTML = this.history.map(h => `
                    <tr>
                        <td>${h.idx}</td>
                        <td>${h.problem}</td>
                        <td class="${h.correct ? 'correct' : ''}">${h.answer}</td>
                        <td class="${h.correct ? '' : 'user-wrong'}">${h.userAnswer}</td>
                        <td>${h.time}s</td>
                        <td class="status-mark ${h.correct ? 'correct' : 'wrong'}">${h.correct ? '✓' : '✗'}</td>
                    </tr>
                `).join('');
            },

            updateStats() {
                document.getElementById('statCount').textContent = `${this.stats.total}/${this.questionCount}`;
                const accuracy = this.stats.total > 0
                    ? Math.round(this.stats.correct / this.stats.total * 100) + '%'
                    : '--';
                document.getElementById('statAccuracy').textContent = accuracy;
            }
        };

        app.initTheme();
        document.querySelector('.btn-primary').focus();
    </script>
</body>
</html>
