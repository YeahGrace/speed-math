<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行测速算练习 - 两位数乘一位数</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 8px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #1a1a2e;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .stat-value.accuracy {
            color: #27ae60;
        }

        .stat-value.time {
            color: #e74c3c;
        }

        .problem-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .problem {
            font-size: 56px;
            font-weight: bold;
            color: #1a1a2e;
            letter-spacing: 4px;
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
        }

        .answer-input {
            width: 180px;
            font-size: 36px;
            text-align: center;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.3s;
            font-variant-numeric: tabular-nums;
        }

        .answer-input:focus {
            border-color: #3498db;
        }

        .answer-input.correct {
            border-color: #27ae60;
            background: #e8f8f0;
        }

        .answer-input.wrong {
            border-color: #e74c3c;
            background: #fdf0f0;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .feedback {
            text-align: center;
            margin-top: 16px;
            font-size: 16px;
            min-height: 24px;
            font-weight: 500;
        }

        .feedback.correct {
            color: #27ae60;
        }

        .feedback.wrong {
            color: #e74c3c;
        }

        .settings {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #eee;
        }

        .settings-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 12px;
        }

        .toggle-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .toggle-btn {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .toggle-btn.active {
            background: #3498db;
            color: white;
            border-color: #3498db;
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        .btn-group .btn {
            flex: 1;
            margin-top: 0;
        }

        .hidden {
            display: none;
        }

        .start-screen {
            text-align: center;
        }

        .start-screen p {
            color: #666;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        /* 结果页面 */
        .result-screen .result-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .result-screen .result-header h2 {
            font-size: 20px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .result-screen .result-summary {
            display: flex;
            justify-content: space-around;
            margin-bottom: 24px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .result-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .result-table th,
        .result-table td {
            padding: 10px 8px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .result-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #666;
            font-size: 12px;
        }

        .result-table td.correct {
            color: #27ae60;
        }

        .result-table td.wrong {
            color: #e74c3c;
            font-weight: 600;
        }

        .result-table td.user-wrong {
            color: #e74c3c;
            text-decoration: line-through;
        }

        .result-table .status-mark {
            font-size: 16px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>行测速算练习</h1>
        <p class="subtitle">两位数 × 一位数（进位强化）</p>

        <!-- 开始界面 -->
        <div id="startScreen" class="start-screen">
            <p>
                本题库优先抽取<strong>需要进位</strong>的乘法题目，<br>
                帮助你强化速算中最容易出错的环节。
            </p>

            <div class="settings" style="margin-top:0; padding-top:0; border-top:none; margin-bottom:24px;">
                <div class="settings-title">选择题量</div>
                <div class="toggle-group" id="questionCountGroup">
                    <button class="toggle-btn active" onclick="app.selectCount(this, 10)">10道</button>
                    <button class="toggle-btn" onclick="app.selectCount(this, 15)">15道</button>
                    <button class="toggle-btn" onclick="app.selectCount(this, 20)">20道</button>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="app.start()">开始练习</button>
            </div>
        </div>

        <!-- 练习界面 -->
        <div id="gameScreen" class="hidden">
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="statCount">0/10</div>
                    <div class="stat-label">进度</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value accuracy" id="statAccuracy">--</div>
                    <div class="stat-label">正确率</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value time" id="statTime">0s</div>
                    <div class="stat-label">本题用时</div>
                </div>
            </div>

            <div class="problem-area">
                <div class="problem" id="problem">-- × -</div>
                <input
                    type="number"
                    class="answer-input"
                    id="answerInput"
                    placeholder="?"
                    autocomplete="off"
                >
            </div>

            <div class="feedback" id="feedback"></div>
        </div>

        <!-- 结果界面 -->
        <div id="resultScreen" class="result-screen hidden">
            <div class="result-header">
                <h2>练习完成</h2>
                <p style="color:#666; font-size:14px;" id="resultSummary"></p>
            </div>

            <div class="result-summary">
                <div class="stat-item">
                    <div class="stat-value" id="resultCorrect">0</div>
                    <div class="stat-label">正确</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="resultWrong">0</div>
                    <div class="stat-label">错误</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value time" id="resultTotalTime">0s</div>
                    <div class="stat-label">总用时</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value accuracy" id="resultAccuracy">0%</div>
                    <div class="stat-label">正确率</div>
                </div>
            </div>

            <table class="result-table">
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>题目</th>
                        <th>正确答案</th>
                        <th>你的答案</th>
                        <th>用时</th>
                        <th>结果</th>
                    </tr>
                </thead>
                <tbody id="resultTableBody"></tbody>
            </table>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="app.start()">再来一次</button>
                <button class="btn btn-secondary" onclick="app.backToStart()">返回首页</button>
            </div>
        </div>

        <!-- 设置 -->
        <div class="settings" id="globalSettings">
            <div class="settings-title">难度筛选（优先出以下类型）</div>
            <div class="toggle-group">
                <button class="toggle-btn active" onclick="app.toggleSetting(this, 'carry')">有进位</button>
                <button class="toggle-btn" onclick="app.toggleSetting(this, 'nocarry')">无进位</button>
            </div>
        </div>
    </div>

    <script>
        const app = {
            currentProblem: null,
            stats: { total: 0, correct: 0 },
            startTime: 0,
            totalStartTime: 0,
            timerInterval: null,
            settings: { carry: true, nocarry: false },
            questionCount: 10,
            history: [],
            sessionStartTime: 0,

            selectCount(btn, count) {
                document.querySelectorAll('#questionCountGroup .toggle-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                this.questionCount = count;
            },

            start() {
                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('resultScreen').classList.add('hidden');
                document.getElementById('gameScreen').classList.remove('hidden');
                document.getElementById('globalSettings').classList.add('hidden');

                this.stats = { total: 0, correct: 0 };
                this.history = [];
                this.sessionStartTime = Date.now();
                this.updateStats();
                this.nextProblem();

                // 移除旧的事件监听，添加新的
                const input = document.getElementById('answerInput');
                const newInput = input.cloneNode(true);
                input.parentNode.replaceChild(newInput, input);
                newInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.submit();
                });
                newInput.focus();
            },

            backToStart() {
                document.getElementById('resultScreen').classList.add('hidden');
                document.getElementById('gameScreen').classList.add('hidden');
                document.getElementById('startScreen').classList.remove('hidden');
                document.getElementById('globalSettings').classList.remove('hidden');
                clearInterval(this.timerInterval);
            },

            toggleSetting(btn, type) {
                const active = btn.classList.contains('active');
                if (active && Object.values(this.settings).filter(v => v).length === 1) return;
                btn.classList.toggle('active');
                this.settings[type] = !active;
            },

            // 判断乘法是否有进位：两位数的个位数 × 一位数 > 10，需要向十位进位
            hasCarry(a, b) {
                return (a % 10) * b > 10;
            },

            generateProblem() {
                const preferCarry = this.settings.carry && !this.settings.nocarry;
                const preferNoCarry = !this.settings.carry && this.settings.nocarry;

                let problems = [];
                for (let a = 10; a <= 99; a++) {
                    for (let b = 2; b <= 9; b++) {
                        const carry = this.hasCarry(a, b);
                        if (preferCarry && !carry) continue;
                        if (preferNoCarry && carry) continue;
                        problems.push({ a, b, answer: a * b, carry });
                    }
                }
                if (problems.length === 0) {
                    for (let a = 10; a <= 99; a++) {
                        for (let b = 2; b <= 9; b++) {
                            problems.push({ a, b, answer: a * b, carry: this.hasCarry(a, b) });
                        }
                    }
                }
                return problems[Math.floor(Math.random() * problems.length)];
            },

            nextProblem() {
                if (this.stats.total >= this.questionCount) {
                    this.showResult();
                    return;
                }

                this.currentProblem = this.generateProblem();
                document.getElementById('problem').textContent =
                    `${this.currentProblem.a} × ${this.currentProblem.b}`;

                const input = document.getElementById('answerInput');
                input.value = '';
                input.className = 'answer-input';
                input.focus();

                document.getElementById('feedback').textContent = '';

                this.startTime = Date.now();
                clearInterval(this.timerInterval);
                this.timerInterval = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - this.startTime) / 1000);
                    document.getElementById('statTime').textContent = elapsed + 's';
                }, 1000);
            },

            submit() {
                const input = document.getElementById('answerInput');
                const userAnswer = parseInt(input.value);

                if (isNaN(userAnswer)) return;

                clearInterval(this.timerInterval);

                const correct = userAnswer === this.currentProblem.answer;
                const time = Math.floor((Date.now() - this.startTime) / 1000);

                this.stats.total++;
                if (correct) this.stats.correct++;

                // 显示结果
                input.className = 'answer-input ' + (correct ? 'correct' : 'wrong');
                const feedback = document.getElementById('feedback');
                feedback.className = 'feedback ' + (correct ? 'correct' : 'wrong');

                if (correct) {
                    feedback.textContent = '✓ 正确';
                } else {
                    feedback.textContent = `✗ 正确答案：${this.currentProblem.answer}`;
                    input.classList.add('shake');
                    setTimeout(() => input.classList.remove('shake'), 300);
                }

                // 记录历史
                this.history.push({
                    idx: this.stats.total,
                    problem: `${this.currentProblem.a} × ${this.currentProblem.b}`,
                    userAnswer,
                    correct,
                    answer: this.currentProblem.answer,
                    time
                });
                this.updateStats();

                // 自动下一题或结束
                if (this.stats.total >= this.questionCount) {
                    setTimeout(() => this.showResult(), correct ? 800 : 1500);
                } else {
                    setTimeout(() => this.nextProblem(), correct ? 800 : 1500);
                }
            },

            showResult() {
                document.getElementById('gameScreen').classList.add('hidden');
                document.getElementById('resultScreen').classList.remove('hidden');
                document.getElementById('globalSettings').classList.remove('hidden');

                const totalTime = Math.floor((Date.now() - this.sessionStartTime) / 1000);
                const wrongCount = this.questionCount - this.stats.correct;
                const accuracy = Math.round(this.stats.correct / this.questionCount * 100);

                document.getElementById('resultCorrect').textContent = this.stats.correct;
                document.getElementById('resultWrong').textContent = wrongCount;
                document.getElementById('resultTotalTime').textContent = totalTime + 's';
                document.getElementById('resultAccuracy').textContent = accuracy + '%';

                const mins = Math.floor(totalTime / 60);
                const secs = totalTime % 60;
                const timeStr = mins > 0 ? `${mins}分${secs}秒` : `${secs}秒`;
                document.getElementById('resultSummary').textContent =
                    `本次练习 ${this.questionCount} 题，总用时 ${timeStr}`;

                const tbody = document.getElementById('resultTableBody');
                tbody.innerHTML = this.history.map(h => `
                    <tr>
                        <td>${h.idx}</td>
                        <td>${h.problem}</td>
                        <td class="${h.correct ? 'correct' : ''}">${h.answer}</td>
                        <td class="${h.correct ? '' : 'user-wrong'}">${h.userAnswer}</td>
                        <td>${h.time}s</td>
                        <td class="status-mark ${h.correct ? 'correct' : 'wrong'}">${h.correct ? '✓' : '✗'}</td>
                    </tr>
                `).join('');
            },

            updateStats() {
                document.getElementById('statCount').textContent = `${this.stats.total}/${this.questionCount}`;
                const accuracy = this.stats.total > 0
                    ? Math.round(this.stats.correct / this.stats.total * 100) + '%'
                    : '--';
                document.getElementById('statAccuracy').textContent = accuracy;
            }
        };

        // 页面加载时聚焦开始按钮
        document.querySelector('.btn-primary').focus();
    </script>
</body>
</html>
